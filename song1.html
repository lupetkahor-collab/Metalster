<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METALSTER</title>

<style>
body{
    margin:0;
    background-image:url('pozadí.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
    color:white;
    font-family:Army;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    padding:30px;
}

button{
    background:white;
    color:black;
    border:none;
    padding:20px;
    font-size:24px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>🤘 METALSTER 🤘</h1>
    <p>Otoč telefon a pusť song</p>

    <button onclick="playSong()">
        ▶ PLAY
    </button>
</div>

<audio id="metal" src="song1.mp3"></audio>

<script>
function playSong(){
    const song = document.getElementById("metal");
    song.play();

    setTimeout(() => {
        song.pause();
    }, 30000);
}
</script>

</body>
</html>
