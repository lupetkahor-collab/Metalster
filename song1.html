<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METALSTER</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
}

body{
    background: url("background.jpg") center center / cover no-repeat fixed;

    color:white;
    font-family:Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
}

.box{
    padding:30px;

    background:rgba(0,0,0,0.7);

    border-radius:20px;
}

button{
    background:#111;
    color:white;

    border:2px solid white;

    padding:20px;

    font-size:24px;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h1>🤘 METALSTER 🤘</h1>

<p>Spusť song</p>

<button onclick="playSong()">
🤘 SPUSTIT 🤘
</button>

</div>

<audio id="metal" src="song1.mp3"></audio>

<script>

function playSong(){

const song = document.getElementById("metal");

song.currentTime = 0;

song.play();

setTimeout(() => {

song.pause();

},30000);

}

</script>

</body>
</html>
